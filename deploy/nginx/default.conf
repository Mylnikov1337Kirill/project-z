map $http_x_forwarded_proto $project_z_forwarded_proto {
  default $http_x_forwarded_proto;
  "" $scheme;
}

map $http_x_forwarded_host $project_z_forwarded_host {
  default $http_x_forwarded_host;
  "" $host;
}

upstream project_z_api {
  server api:3000;
  keepalive 16;
}

log_format project_z '$remote_addr [$time_local] "$request_method $uri $server_protocol" '
                     '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

server {
  listen 8080;
  server_name _;
  server_tokens off;

  root /usr/share/nginx/html;
  index index.html;

  access_log /var/log/nginx/access.log project_z;

  location ~ ^/api(?:/|$) {
    proxy_http_version 1.1;
    proxy_pass http://project_z_api;
    proxy_intercept_errors off;
    proxy_redirect off;

    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $project_z_forwarded_host;
    proxy_set_header X-Forwarded-Proto $project_z_forwarded_proto;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header Authorization $http_authorization;
    proxy_pass_header Set-Cookie;
  }

  location = /healthz {
    proxy_http_version 1.1;
    proxy_pass http://project_z_api;
    proxy_intercept_errors off;
    proxy_redirect off;

    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $project_z_forwarded_host;
    proxy_set_header X-Forwarded-Proto $project_z_forwarded_proto;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location = /index.html {
    try_files /index.html =404;
    add_header Cache-Control "no-store" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
