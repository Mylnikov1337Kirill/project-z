name: project-z-node-proxy

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${PROJECT_Z_POSTGRES_DB:-project_z}
      POSTGRES_USER: ${PROJECT_Z_POSTGRES_USER:-project_z}
      POSTGRES_PASSWORD: ${PROJECT_Z_POSTGRES_PASSWORD:-project_z_local_password}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${PROJECT_Z_DB_PORT:-54321}:5432"
    volumes:
      - project_z_postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgres://${PROJECT_Z_POSTGRES_USER:-project_z}:${PROJECT_Z_POSTGRES_PASSWORD:-project_z_local_password}@db:5432/${PROJECT_Z_POSTGRES_DB:-project_z}
      PROJECT_Z_PILOT_SESSION_COOKIE_NAME: ${PROJECT_Z_PILOT_SESSION_COOKIE_NAME:-project_z_pilot_session_id}
      PROJECT_Z_QA_PASS: ${PROJECT_Z_QA_PASS:-}
      PROJECT_Z_ANNOUNCEMENT_WORKER_TOKEN: ${PROJECT_Z_ANNOUNCEMENT_WORKER_TOKEN:-}
      PROJECT_Z_PACHCA_DELIVERY_MODE: ${PROJECT_Z_PACHCA_DELIVERY_MODE:-dry-run}
      PROJECT_Z_ANNOUNCEMENT_BATCH_LIMIT: ${PROJECT_Z_ANNOUNCEMENT_BATCH_LIMIT:-10}
      PROJECT_Z_ANNOUNCEMENT_MAX_ATTEMPTS: ${PROJECT_Z_ANNOUNCEMENT_MAX_ATTEMPTS:-3}
    expose:
      - "3000"

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${PROJECT_Z_PROXY_PORT:-8080}:8080"
    volumes:
      - ../dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  project_z_postgres_data:
